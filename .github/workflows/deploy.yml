name: Build and Deploy

# Trigger this workflow on every push to main.
# This means every time you merge or push code, the image is rebuilt and deployed automatically.
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code so the workflow can access it.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to Azure using the service principal credentials stored as GitHub secrets.
      # This allows subsequent steps to interact with Azure resources.
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      # Step 3: Log in to Azure Container Registry so Docker can push the image.
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: flightpricetracker.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Step 4: Set up Docker Buildx — required for cross-platform builds (linux/amd64).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Build the image for linux/amd64 and push it to ACR.
      # --provenance=false --sbom=false disables attestation manifests that confuse Azure.
      # The image is tagged with both 'latest' and the git commit SHA.
      # The SHA tag lets you identify exactly which commit is running in production.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            flightpricetracker.azurecr.io/flight-tracker-python:latest
            flightpricetracker.azurecr.io/flight-tracker-python:${{ github.sha }}

      # Step 6: Update the Container App Job to use the newly pushed image.
      # This restarts the job definition with the latest image — the next scheduled
      # run (or manual trigger) will use the new image automatically.
      - name: Update Container App Job
        run: |
          az containerapp job update \
            --name flightpricetrackerjob \
            --resource-group FlightPriceTrackerRG \
            --image flightpricetracker.azurecr.io/flight-tracker-python:latest
